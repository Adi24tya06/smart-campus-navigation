<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Campus Navigation - LPU</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f2f4f7;
}

header{
background:#0f172a;
color:white;
text-align:center;
padding:15px;
}

.container{
display:flex;
height:90vh;
}

.sidebar{
width:320px;
background:white;
padding:20px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
}

.sidebar h2{
margin-top:0;
}

select,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

.result{
margin-top:20px;
background:#eef2ff;
padding:10px;
border-radius:5px;
}

.map-section{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#e5e7eb;
overflow:auto;
}

.map-container{
position:relative;
}

.map-container img{
width:900px;
border:3px solid #333;
}

/* Map markers */

.node{
width:14px;
height:14px;
background:red;
border-radius:50%;
position:absolute;
cursor:pointer;
}

/* Example positions */

.gate{
bottom:40px;
left:430px;
}

.library{
top:520px;
left:480px;
}

.admin{
top:470px;
left:430px;
}

.hostel{
top:250px;
left:540px;
}

.auditorium{
top:420px;
left:330px;
}

</style>

</head>

<body>

<header>
<h1>Smart Campus Navigation System</h1>
<p>Lovely Professional University</p>
</header>

<div class="container">

<div class="sidebar">

<h2>Find Route</h2>

<label>Starting Location</label>
<select id="start">

<option value="Gate">Main Gate</option>
<option value="Library">Library</option>
<option value="Admin">Admin Block</option>
<option value="Hostel">Hostel</option>
<option value="Auditorium">Auditorium</option>

</select>

<label>Destination</label>
<select id="end">

<option value="Library">Library</option>
<option value="Admin">Admin Block</option>
<option value="Hostel">Hostel</option>
<option value="Auditorium">Auditorium</option>

</select>

<button onclick="findRoute()">Find Route</button>

<div class="result">
<p id="result">Select locations to calculate route.</p>
</div>

</div>

<div class="map-section">

<div class="map-container">

<img src="assets/lpu-campus-map.png" alt="LPU Campus Map">

<div class="node gate" title="Main Gate"></div>
<div class="node library" title="Library"></div>
<div class="node admin" title="Admin Block"></div>
<div class="node hostel" title="Hostel"></div>
<div class="node auditorium" title="Auditorium"></div>

</div>

</div>

</div>

<script>

function findRoute(){

let start=document.getElementById("start").value;
let end=document.getElementById("end").value;

if(start===end){

document.getElementById("result").innerText="You are already at "+start;
return;

}

document.getElementById("result").innerText=
"Calculating shortest route from "+start+" to "+end+"...";

}

</script>
<script src="script.js"></script>
</body>
</html>
